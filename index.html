<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETE</title>
<style>
  :root{
    --bg:#fbfbfd;
    --text:#1d1d1f;
    --sub:#6e6e73;
    --accent:#0071e3;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Hero ─────────────────────────────── */
  .hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
    background:radial-gradient(ellipse at top, #ffffff 0%, #fbfbfd 60%);
  }
  .eyebrow{
    font-size:15px;
    font-weight:600;
    color:var(--accent);
    letter-spacing:.02em;
    margin-bottom:18px;
    opacity:0;
    animation:fadeUp .8s ease forwards;
  }
  .hero h1{
    font-size:clamp(42px,8vw,88px);
    font-weight:700;
    letter-spacing:-.03em;
    line-height:1.05;
    margin:0 0 20px;
    background:linear-gradient(180deg,#1d1d1f 0%,#434344 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    opacity:0;
    animation:fadeUp .8s ease .1s forwards;
  }
  .hero p{
    font-size:clamp(18px,2.4vw,24px);
    color:var(--sub);
    max-width:560px;
    line-height:1.5;
    margin:0 0 40px;
    opacity:0;
    animation:fadeUp .8s ease .2s forwards;
  }
  .cta{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:14px 28px;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    border-radius:980px;
    font-size:17px;
    font-weight:500;
    transition:transform .25s ease, box-shadow .25s ease;
    opacity:0;
    animation:fadeUp .8s ease .3s forwards;
  }
  .cta:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 24px rgba(0,113,227,.35);
  }
  .scroll-cue{
    position:absolute;
    bottom:36px;
    width:24px;
    height:24px;
    border-right:2px solid var(--sub);
    border-bottom:2px solid var(--sub);
    transform:rotate(45deg);
    opacity:.4;
    animation:bounce 2s infinite;
  }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(16px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes bounce{
    0%,100%{transform:translate(0,0) rotate(45deg);}
    50%{transform:translate(0,8px) rotate(45deg);}
  }

  /* ── Projects ─────────────────────────── */
  .section{
    max-width:920px;
    margin:0 auto;
    padding:120px 24px;
  }
  .section h2{
    font-size:clamp(28px,4vw,40px);
    font-weight:700;
    letter-spacing:-.02em;
    text-align:center;
    margin:0 0 60px;
  }
  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:24px;
  }
  .card{
    background:var(--card);
    border-radius:20px;
    padding:32px;
    text-decoration:none;
    color:var(--text);
    box-shadow:0 2px 12px rgba(0,0,0,.05);
    transition:transform .3s ease, box-shadow .3s ease;
    display:block;
  }
  .card:hover{
    transform:translateY(-6px);
    box-shadow:0 16px 32px rgba(0,0,0,.1);
  }
  .card .tag{
    display:inline-block;
    font-size:12px;
    font-weight:600;
    color:var(--accent);
    background:rgba(0,113,227,.1);
    padding:4px 12px;
    border-radius:980px;
    margin-bottom:16px;
  }
  .card h3{
    font-size:22px;
    font-weight:600;
    margin:0 0 10px;
    letter-spacing:-.01em;
  }
  .card p{
    font-size:15px;
    color:var(--sub);
    line-height:1.5;
    margin:0 0 18px;
  }
  .card .go{
    font-size:15px;
    font-weight:600;
    color:var(--accent);
  }

  footer{
    text-align:center;
    padding:48px 24px 64px;
    color:var(--sub);
    font-size:13px;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --bg:#000000;
      --text:#f5f5f7;
      --sub:#a1a1a6;
      --card:#1c1c1e;
    }
    .hero{background:radial-gradient(ellipse at top, #1c1c1e 0%, #000 60%);}
    .hero h1{background:linear-gradient(180deg,#f5f5f7 0%,#a1a1a6 100%);-webkit-background-clip:text;background-clip:text;}
    .card{box-shadow:0 2px 12px rgba(0,0,0,.4);}
  }
</style>
</head>
<body>

  <section class="hero">
    <div class="eyebrow">Welcome</div>
    <h1>Hi, I'm TETE.</h1>
    <p>기록하고 만드는 것들을 이곳에 남깁니다.</p>
    <a class="cta" href="#projects">둘러보기 ↓</a>
    <div class="scroll-cue"></div>
  </section>

  <section id="projects" class="section">
    <h2>Projects</h2>
    <div class="cards">
      <a class="card" href="하와이_답사_동선지도.html">
        <span class="tag">Travel</span>
        <h3>하와이 답사 동선지도</h3>
        <p>하와이 여행 동선을 정리한 지도 페이지입니다.</p>
        <span class="go">보러가기 →</span>
      </a>
    </div>
  </section>

  <footer>© 2026 TETE. Built with GitHub Pages.</footer>

</body>
</html>
