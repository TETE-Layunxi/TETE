    border-radius: 16px; padding: 6px 12px; font-size: 12.5px; font-weight: 700; cursor: pointer;

  .day-title { font-size: 15px; font-weight: 800; margin: 10px 0 2px; }
  .day-date { font-size: 12px; color: #9aa0ab; margin-bottom: 8px; }
  .day-total {
    background: #262a33; border-radius: 8px; padding: 8px 12px; font-size: 12.5px;
    margin-bottom: 10px; color: #ffd580; font-weight: 700;
  }
  .seg {
    border-left: 3px solid #444; padding: 7px 10px; margin-bottom: 6px;
    background: #21252d; border-radius: 0 8px 8px 0; font-size: 12.5px; line-height: 1.55;
  }
  .seg .route { font-weight: 700; color: #fff; }
  .seg .dist { color: #7fd4a0; font-weight: 700; }
  .seg .time { color: #9aa0ab; }
  .stop-list { margin-top: 12px; }
  .stop {
    display: flex; gap: 8px; align-items: flex-start; padding: 5px 2px;
    border-bottom: 1px solid #262a33; font-size: 12.5px; cursor: pointer;
  }
  .stop:hover { background: #262a33; }
  .stop .num {
    min-width: 20px; height: 20px; border-radius: 50%; color: #111;
    font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .stop .t { color: #ffd580; font-size: 11.5px; min-width: 40px; margin-top: 2px; }
  .stop .nm { color: #e8e8e8; }
  .stop .nm small { color: #9aa0ab; display: block; }
  .note { font-size: 11px; color: #7a808c; margin-top: 14px; line-height: 1.6; }
  #map { flex: 1; height: 100vh; }
  .num-icon {
    border-radius: 50%; color: #111; font-weight: 800; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
  .leaflet-popup-content { font-size: 13px; line-height: 1.6; }
  .leaflet-popup-content b { font-size: 13.5px; }
  .approx { color:#c9a227; font-size: 11px; }

// ─────────────────────────── 지도 ───────────────────────────
var map = L.map('map', { zoomControl: true }).setView([21.44, -157.85], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18, attribution: '&copy; OpenStreetMap'
}).addTo(map);

var layerGroup = L.layerGroup().addTo(map);
var current = 0; // 0 = 전체

function numIcon(color, n) {
  return L.divIcon({
    className: '', iconSize: [26, 26], iconAnchor: [13, 13],
    html: '<div class="num-icon" style="width:26px;height:26px;background:' + color + '">' + n + '</div>'
  });
}

function drawDay(day, dim) {
  var pts = day.stops.map(function (s) { return [s[0], s[1]]; });
  var line = L.polyline(pts, {
    color: day.color, weight: dim ? 3 : 5, opacity: dim ? 0.45 : 0.9, dashArray: dim ? '6 6' : null
  }).addTo(layerGroup);
  if (!dim) {
    day.stops.forEach(function (s, i) {
      L.marker([s[0], s[1]], { icon: numIcon(day.color, i + 1) })
        .bindPopup('<b>' + (i + 1) + '. ' + s[3] + '</b><br><span style="color:#c47f00;font-weight:700">' + s[2] + '</span> · ' + day.date +
          (s[4] ? '<br>' + s[4] : '') +
          (i < day.legs.length ? '<br><span class="approx">다음 구간 → 약 ' + day.legs[i][0].toFixed(1) + 'km · 차량 ' + day.legs[i][1] + '분</span>' : ''))
        .addTo(layerGroup);
    });
  } else {
    line.bindTooltip('Day ' + day.id + ' · ' + day.date, { sticky: true });
  }
  return pts;
}

function render(dayId) {
  current = dayId;
  layerGroup.clearLayers();
  var boundsPts = [];
  if (dayId === 0) {
    DAYS.forEach(function (d) { boundsPts = boundsPts.concat(drawDay(d, true)); });
    // 전체 보기에서도 주요 거점 마커
    DAYS.forEach(function (d) {
      d.stops.forEach(function (s, i) {
        if (i === 0 || i === d.stops.length - 1) return;
        L.circleMarker([s[0], s[1]], { radius: 4, color: d.color, fillColor: d.color, fillOpacity: 0.9 })
          .bindTooltip('D' + d.id + ' · ' + s[3]).addTo(layerGroup);
      });
    });
  } else {
    var d = DAYS[dayId - 1];
    boundsPts = drawDay(d, false);
  }
  if (boundsPts.length) map.fitBounds(boundsPts, { padding: [40, 40] });
  renderSidebar(dayId);
  renderBtns();
}

// ─────────────────────────── 사이드바 ───────────────────────────
function renderBtns() {
  var html = '<button class="day-btn' + (current === 0 ? ' active' : '') + '" style="' + (current === 0 ? 'background:#fff' : '') + '" onclick="render(0)">전체</button>';
  DAYS.forEach(function (d) {
    var act = current === d.id;
    html += '<button class="day-btn' + (act ? ' active' : '') + '" style="' + (act ? 'background:' + d.color : 'border-color:' + d.color + '55') + '" onclick="render(' + d.id + ')">D' + d.id + '</button>';
  });
  document.getElementById('dayBtns').innerHTML = html;
}

function renderSidebar(dayId) {
  var el = document.getElementById('dayInfo');
  if (dayId === 0) {
    var totKm = 0, totMin = 0, rows = '';
    DAYS.forEach(function (d) {
      var km = 0, mn = 0;
      d.legs.forEach(function (l) { km += l[0]; mn += l[1]; });
      totKm += km; totMin += mn;
      rows += '<div class="seg" style="border-color:' + d.color + '">' +
        '<span class="route">Day ' + d.id + ' · ' + d.date + '</span> — ' + d.title.split('·')[1].trim() +
        '<br><span class="dist">약 ' + km.toFixed(0) + 'km</span> · <span class="time">차량 약 ' + Math.round(mn / 60 * 10) / 10 + '시간</span>' +
        '<br><span class="time">숙소 : ' + d.hotel + '</span></div>';
    });
    el.innerHTML = '<div class="day-title">전체 일정 요약</div>' +
      '<div class="day-total">총 차량 이동 약 ' + totKm.toFixed(0) + 'km · 약 ' + Math.round(totMin / 60 * 10) / 10 + '시간 (7일)</div>' + rows +
      '<div class="note">일자 버튼(D1~D7)을 누르면 해당일 상세 동선과 구간별 거리를 볼 수 있음</div>';
    return;
  }
  var d = DAYS[dayId - 1];
  var km = 0, mn = 0;
  d.legs.forEach(function (l) { km += l[0]; mn += l[1]; });
  var html = '<div class="day-title" style="color:' + d.color + '">' + d.title + '</div>' +
    '<div class="day-date">' + d.date + ' · 숙소 : ' + d.hotel + '</div>' +
    '<div class="day-total">이 날 차량 이동 합계 : 약 ' + km.toFixed(1) + 'km · 약 ' + mn + '분</div>';
  // 구간별 거리
  d.legs.forEach(function (l, i) {
    html += '<div class="seg" style="border-color:' + d.color + '">' +
      '<span class="route">' + (i + 1) + '. ' + shortName(d.stops[i][3]) + ' → ' + shortName(d.stops[i + 1][3]) + '</span><br>' +
      '<span class="dist">약 ' + l[0].toFixed(1) + 'km</span> · <span class="time">차량 약 ' + l[1] + '분</span></div>';
  });
  // 스탑 리스트
  html += '<div class="stop-list">';
  d.stops.forEach(function (s, i) {
    html += '<div class="stop" onclick="map.setView([' + s[0] + ',' + s[1] + '], 14)">' +
      '<div class="num" style="background:' + d.color + '">' + (i + 1) + '</div>' +
      '<div class="t">' + s[2] + '</div>' +
      '<div class="nm">' + s[3] + (s[4] ? '<small>' + s[4] + '</small>' : '') + '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function shortName(n) { return n.replace(/\s*\(.*?\)\s*/g, '').split(' 체크인')[0].split(' 인스펙션')[0].split(' 답사')[0].substring(0, 18); }

render(0);
</script>
